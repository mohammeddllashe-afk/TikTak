<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>טבלת הזמנות</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      color: #1b1f23;
      min-height: 100vh;
      padding: 24px;
    }

    .table-shell {
      width: min(1180px, 100%);
      margin: auto;
      background: white;
      border: 1px solid #dfe2e5;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(51, 63, 79, 0.08);
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid #edf2f7;
    }

    .toolbar h1 {
      margin: 0;
      font-size: 20px;
    }

    .toolbar button,
    .action-btn {
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      margin-left: 6px;
    }

    .save { background: #2563eb; color: white; }
    .add { background: #10b981; color: white; }
    .archive { background: #f59e0b; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .alert-btn { background: #0284c7; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead {
      background: #f0f5f9;
    }

    th, td {
      padding: 16px 18px;
      border-bottom: 1px solid #edf2f7;
      text-align: right;
      font-size: 15px;
      word-break: break-word;
    }

    .editable-cell {
      background: rgba(16, 185, 129, 0.08);
      min-height: 30px;
    }

    .editable-cell:focus {
      outline: 2px solid #2563eb;
    }

    .status-select {
      width: 100%;
      border: none;
      min-height: 38px;
      border-radius: 999px;
      font-weight: bold;
      padding: 0 12px;
      cursor: pointer;
    }

    .status-home {
      background: #fbe8ea;
      color: #b42318;
    }

    .status-table {
      background: #eef2ff;
      color: #1e40af;
    }

    .archive-panel {
      display: none;
      padding: 16px 22px 22px;
      border-top: 1px solid #edf2f7;
    }

    .archive-panel.active {
      display: block;
    }

    .archive-empty {
      text-align: center;
      background: #f8fafc;
      padding: 18px;
      border-radius: 14px;
      margin-top: 12px;
    }

    tr.alert-highlight td {
      background: #fff7d7 !important;
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      table {
        display: block;
        overflow-x: auto;
      }
      th, td {
        padding: 12px 10px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="table-shell">
    <div class="toolbar">
      <h1>טבלת הזמנות - עריכה ישירה</h1>
      <div>
        <button class="archive" id="toggleArchive">הצג ארכיון</button>
        <button class="add" id="addRow">הוסף שורה</button>
        <button class="save" id="saveData">שמור שינויים</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>פעולות</th>
          <th>הזמנה</th>
          <th>סטטוס</th>
          <th>מחיר</th>
          <th>שם / טלפון</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="archive-panel" id="archivePanel">
      <h2>ארכיון רשומות</h2>
      <button class="delete-btn" id="clearArchive">נקה ארכיון</button>

      <table>
        <thead>
          <tr>
            <th>הזמנה</th>
            <th>סטטוס</th>
            <th>מחיר</th>
            <th>שם / טלפון</th>
            <th>נמחק ב</th>
          </tr>
        </thead>
        <tbody id="archiveBody"></tbody>
      </table>

      <div class="archive-empty" id="archiveEmpty">אין פריטים בארכיון כרגע.</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC21Uw53Bxjy0zqJvCehrbJdUhS6RZcqes",
      authDomain: "tik-tak-67bf8.firebaseapp.com",
      databaseURL: "https://tik-tak-67bf8-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tik-tak-67bf8",
      storageBucket: "tik-tak-67bf8.firebasestorage.app",
      messagingSenderId: "134580367765",
      appId: "1:134580367765:web:556a8d85ad7baecb62869c",
      measurementId: "G-63EMCYEFVS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ordersRef = ref(db, "orders");
    const archiveRef = ref(db, "archive");

    const tableBody = document.getElementById("tableBody");
    const saveButton = document.getElementById("saveData");
    const addButton = document.getElementById("addRow");
    const toggleArchiveButton = document.getElementById("toggleArchive");
    const archivePanel = document.getElementById("archivePanel");
    const archiveBody = document.getElementById("archiveBody");
    const archiveEmpty = document.getElementById("archiveEmpty");
    const clearArchiveButton = document.getElementById("clearArchive");

    const statusOptions = [
      { value: "", label: "בחר סטטוס", className: "" },
      { value: "בית", label: "בית", className: "status-home" },
      { value: "שולחן", label: "שולחן", className: "status-table" }
    ];

    function getStatusClass(status) {
      const match = statusOptions.find(option => option.value === status);
      return match ? match.className : "";
    }

    function createStatusSelect(value) {
      const select = document.createElement("select");
      select.className = `status-select ${getStatusClass(value)}`;

      statusOptions.forEach(option => {
        const opt = document.createElement("option");
        opt.value = option.value;
        opt.textContent = option.label;
        if (option.value === value) opt.selected = true;
        select.appendChild(opt);
      });

      select.addEventListener("change", () => {
        select.className = `status-select ${getStatusClass(select.value)}`;
      });

      return select;
    }

    function collectData() {
      const rows = [];

      Array.from(tableBody.children).forEach(tr => {
        const order = tr.children[1].textContent.trim();
        const status = tr.children[2].querySelector("select").value;
        const price = tr.children[3].textContent.trim();
        const customer = tr.children[4].textContent.trim();

        if (order || status || price || customer) {
          rows.push({ order, status, price, customer });
        }
      });

      return rows;
    }

    async function saveOrders() {
      await set(ordersRef, collectData());
    }

    function playNotificationSound() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "square";
        osc.frequency.value = 880;
        gain.gain.value = 0.3;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        setTimeout(() => {
          osc.stop();
          ctx.close();
        }, 500);
      } catch (e) {
        console.log("Audio error", e);
      }
    }

    function createActionsCell(tr) {
      const actionsCell = document.createElement("td");

      const alertButton = document.createElement("button");
      alertButton.type = "button";
      alertButton.className = "action-btn alert-btn";
      alertButton.textContent = "התראה";

      alertButton.addEventListener("click", () => {
        playNotificationSound();
        tr.classList.add("alert-highlight");
        setTimeout(() => tr.classList.remove("alert-highlight"), 5000);
      });

      const deleteButton = document.createElement("button");
      deleteButton.type = "button";
      deleteButton.className = "action-btn delete-btn";
      deleteButton.textContent = "מחק";

      deleteButton.addEventListener("click", async () => {
        const rowData = {
          order: tr.children[1].textContent.trim(),
          status: tr.children[2].querySelector("select").value,
          price: tr.children[3].textContent.trim(),
          customer: tr.children[4].textContent.trim(),
          archivedAt: Date.now()
        };

        const snap = await get(archiveRef);
        const archive = snap.val() || [];

        archive.push(rowData);
        await set(archiveRef, archive);

        tr.remove();
        await saveOrders();
      });

      actionsCell.appendChild(alertButton);
      actionsCell.appendChild(deleteButton);

      return actionsCell;
    }

    function renderTable(rows = []) {
      tableBody.innerHTML = "";

      rows.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td></td>
          <td contenteditable="true" class="editable-cell">${row.order || ""}</td>
          <td></td>
          <td contenteditable="true" class="editable-cell">${row.price || ""}</td>
          <td contenteditable="true" class="editable-cell">${row.customer || ""}</td>
        `;

        tr.children[0].replaceWith(createActionsCell(tr));
        tr.children[2].appendChild(createStatusSelect(row.status || ""));

        tableBody.appendChild(tr);
      });
    }

    function renderArchive(rows = []) {
      archiveBody.innerHTML = "";

      if (!rows || rows.length === 0) {
        archiveEmpty.style.display = "block";
        return;
      }

      archiveEmpty.style.display = "none";

      rows.forEach(row => {
        const tr = document.createElement("tr");
        const archivedAt = row.archivedAt
          ? new Date(row.archivedAt).toLocaleString("he-IL")
          : "";

        tr.innerHTML = `
          <td>${row.order || ""}</td>
          <td>${row.status || ""}</td>
          <td>${row.price || ""}</td>
          <td>${row.customer || ""}</td>
          <td>${archivedAt}</td>
        `;

        archiveBody.appendChild(tr);
      });
    }

    onValue(ordersRef, snapshot => {
      const rows = snapshot.val() || [];
      renderTable(rows);
    });

    onValue(archiveRef, snapshot => {
      const rows = snapshot.val() || [];
      renderArchive(rows);
    });

    saveButton.addEventListener("click", async () => {
      await saveOrders();
      saveButton.textContent = "נשמר";
      setTimeout(() => {
        saveButton.textContent = "שמור שינויים";
      }, 1200);
    });

    addButton.addEventListener("click", () => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td></td>
        <td contenteditable="true" class="editable-cell"></td>
        <td></td>
        <td contenteditable="true" class="editable-cell"></td>
        <td contenteditable="true" class="editable-cell"></td>
      `;

      tr.children[0].replaceWith(createActionsCell(tr));
      tr.children[2].appendChild(createStatusSelect(""));

      tableBody.appendChild(tr);
      tr.children[1].focus();
    });

    toggleArchiveButton.addEventListener("click", () => {
      const isActive = archivePanel.classList.toggle("active");
      toggleArchiveButton.textContent = isActive ? "סגור ארכיון" : "הצג ארכיון";
    });

    clearArchiveButton.addEventListener("click", async () => {
      await set(archiveRef, []);
    });
  </script>
</body>
</html>
